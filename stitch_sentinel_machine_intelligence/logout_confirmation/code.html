<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Industrial Intelligence - Logout</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "tertiary": "#ffb595",
                    "on-primary": "#002e69",
                    "on-primary-container": "#00285c",
                    "surface-container-highest": "#353534",
                    "surface-dim": "#131313",
                    "on-background": "#e5e2e1",
                    "on-tertiary": "#571e00",
                    "on-secondary": "#003824",
                    "primary-fixed": "#d8e2ff",
                    "inverse-surface": "#e5e2e1",
                    "on-error": "#690005",
                    "secondary-fixed-dim": "#4edea3",
                    "on-secondary-fixed": "#002113",
                    "tertiary-fixed": "#ffdbcc",
                    "on-tertiary-fixed": "#351000",
                    "inverse-primary": "#005bc1",
                    "surface-container-lowest": "#0e0e0e",
                    "inverse-on-surface": "#313030",
                    "primary-fixed-dim": "#adc6ff",
                    "surface-container": "#201f1f",
                    "error-container": "#93000a",
                    "outline": "#8b90a0",
                    "surface-bright": "#3a3939",
                    "surface": "#131313",
                    "error": "#ffb4ab",
                    "on-error-container": "#ffdad6",
                    "on-primary-fixed": "#001a41",
                    "on-tertiary-fixed-variant": "#7c2e00",
                    "surface-variant": "#353534",
                    "surface-container-low": "#1c1b1b",
                    "surface-tint": "#adc6ff",
                    "on-surface-variant": "#c1c6d7",
                    "on-secondary-fixed-variant": "#005236",
                    "secondary-container": "#00a572",
                    "on-secondary-container": "#00311f",
                    "on-primary-fixed-variant": "#004493",
                    "outline-variant": "#414755",
                    "secondary": "#4edea3",
                    "background": "#131313",
                    "primary": "#adc6ff",
                    "on-surface": "#e5e2e1",
                    "primary-container": "#4b8eff",
                    "tertiary-container": "#ef6719",
                    "tertiary-fixed-dim": "#ffb595",
                    "surface-container-high": "#2a2a2a",
                    "on-tertiary-container": "#4c1a00",
                    "secondary-fixed": "#6ffbbe"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "fontFamily": {
                    "headline": ["Inter"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          }
        }
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-border {
            outline: 1px solid rgba(65, 71, 85, 0.15);
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface selection:bg-primary/30 antialiased overflow-hidden">
<!-- Mock Dashboard Background (Blurred out for Logout Confirmation context) -->
<div class="fixed inset-0 z-0 blur-xl scale-105 pointer-events-none opacity-40">
<div class="flex h-screen w-full">
<!-- Mock SideNav -->
<div class="w-64 bg-surface-container-low border-r border-outline-variant/10 p-8">
<div class="h-8 w-32 bg-primary/20 mb-12"></div>
<div class="space-y-6">
<div class="h-4 w-full bg-surface-container-high"></div>
<div class="h-4 w-4/5 bg-surface-container-high"></div>
<div class="h-4 w-full bg-surface-container-high"></div>
</div>
</div>
<!-- Mock Content -->
<div class="flex-1 p-12 space-y-12">
<div class="grid grid-cols-3 gap-8">
<div class="h-64 bg-surface-container-high rounded-xl"></div>
<div class="h-64 bg-surface-container-high rounded-xl"></div>
<div class="h-64 bg-surface-container-high rounded-xl"></div>
</div>
<div class="h-[400px] bg-surface-container-high rounded-xl w-full"></div>
</div>
</div>
</div>
<!-- Modal Overlay Backdrop -->
<div class="fixed inset-0 bg-[#0e0e0e]/80 backdrop-blur-md z-40 flex items-center justify-center p-6">
<!-- Logout Confirmation Modal (The Kinetic Monolith) -->
<div class="relative w-full max-w-md bg-surface-container-low glass-border rounded-xl shadow-[0_40px_80px_rgba(0,0,0,0.6)] overflow-hidden">
<!-- Atmospheric Gradient Accent -->
<div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-primary/50 via-primary to-primary/50"></div>
<div class="p-10 flex flex-col items-center text-center">
<!-- Icon Visual -->
<div class="mb-8 w-20 h-20 rounded-full bg-surface-container-high flex items-center justify-center glass-border">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="logout">logout</span>
</div>
<!-- Text Content -->
<h2 class="text-3xl font-headline font-extrabold tracking-tight text-on-surface mb-3">
                    Terminate Session?
                </h2>
<p class="text-on-surface-variant leading-relaxed mb-10 max-w-[280px]">
                    Are you sure you want to log out? Any unsaved telemetry analysis will be lost.
                </p>
<!-- Action Cluster -->
<div class="w-full flex flex-col gap-4">
<!-- Confirm Button (Primary High Gloss Gradient) -->
<button class="w-full py-4 px-6 rounded-lg bg-gradient-to-r from-primary to-primary-container text-on-primary font-bold tracking-tight hover:brightness-110 active:scale-95 transition-all duration-200">
                        Confirm Logout
                    </button>
<!-- Cancel Button (Secondary Ghost Style) -->
<button class="w-full py-4 px-6 rounded-lg bg-surface-container-high glass-border text-on-surface font-semibold hover:bg-surface-bright transition-all duration-200">
                        Cancel and Stay
                    </button>
</div>
</div>
<!-- Metadata/Security Note -->
<div class="bg-surface-container-lowest py-4 px-10 flex items-center justify-center gap-2 border-t border-outline-variant/5">
<span class="material-symbols-outlined text-[14px] text-on-secondary-fixed-variant" data-icon="shield">shield</span>
<span class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant font-semibold">
                    Secure Session Termination
                </span>
</div>
</div>
</div>
<!-- Background Decoration (Ambient Glowing Orbs) -->
<div class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-primary/5 blur-[120px] pointer-events-none z-10"></div>
<div class="fixed bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-secondary/5 blur-[120px] pointer-events-none z-10"></div>
</body></html>
