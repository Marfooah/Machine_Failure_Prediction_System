<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        .glass-panel {
            background: rgba(28, 27, 27, 0.6);
            backdrop-filter: blur(30px);
        }
        .ghost-border {
            outline: 1px solid rgba(65, 71, 85, 0.15);
        }
        .kinetic-bg {
            background: radial-gradient(circle at top right, #1c1b1b 0%, #131313 100%);
        }
    </style>

<body class="bg-background text-on-surface font-body selection:bg-primary/30 selection:text-primary min-h-screen flex flex-col items-center justify-center kinetic-bg overflow-hidden relative">
<div class="absolute inset-0 z-0 pointer-events-none">
<div class="absolute top-[-10%] right-[-10%] w-[600px] h-[600px] bg-primary/5 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-5%] left-[-5%] w-[400px] h-[400px] bg-secondary/5 rounded-full blur-[100px]"></div>
</div>
<div class="z-10 w-full max-w-md px-6">
<div class="mb-12 text-center">
<h1 class="text-3xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-primary to-primary-container inline-block">
                Industrial Intelligence
            </h1>
<p class="text-[10px] uppercase tracking-[0.2em] font-semibold text-outline mt-2">
                Secure Terminal Access
            </p>
</div>
<div class="glass-panel ghost-border rounded-xl p-10 shadow-[0_20px_40px_rgba(0,0,0,0.4)] relative group">
<div class="absolute top-0 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-primary/30 to-transparent"></div>
<div class="mb-10 text-center">
<h2 class="text-2xl font-bold tracking-tight text-on-surface">Welcome Back</h2>
<p class="text-sm text-outline mt-1">Authenticate to monitor active nodes</p>
</div>
<form class="space-y-6">
<div class="space-y-1">
<div class="relative group">
<label class="absolute -top-2 left-3 px-1 bg-surface-container-low text-[10px] uppercase tracking-widest font-bold text-primary z-10">Email Address</label>
<div class="flex items-center bg-surface-container-low ghost-border rounded-lg px-4 py-4 focus-within:outline-primary transition-all duration-300">
<span class="material-symbols-outlined text-outline text-lg mr-3" data-icon="mail">mail</span>
<input class="bg-transparent border-none p-0 w-full text-sm text-on-surface placeholder:text-outline/40 focus:ring-0 focus:outline-none" placeholder="name@industrial.ai" type="email"/>
</div>
</div>
</div>
<div class="space-y-1">
<div class="relative group">
<label class="absolute -top-2 left-3 px-1 bg-surface-container-low text-[10px] uppercase tracking-widest font-bold text-primary z-10">Security Key</label>
<div class="flex items-center bg-surface-container-low ghost-border rounded-lg px-4 py-4 focus-within:outline-primary transition-all duration-300">
<span class="material-symbols-outlined text-outline text-lg mr-3" data-icon="lock">lock</span>
<input class="bg-transparent border-none p-0 w-full text-sm text-on-surface placeholder:text-outline/40 focus:ring-0 focus:outline-none" placeholder="••••••••" type="password"/>
<button class="text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-lg" data-icon="visibility">visibility</span>
</button>
</div>
</div>
</div>
<div class="flex items-center justify-between py-2">
<label class="flex items-center space-x-2 cursor-pointer group">
<div class="relative flex items-center justify-center">
<input class="peer h-4 w-4 rounded border-outline-variant bg-surface-container-high text-primary focus:ring-0 focus:ring-offset-0 transition-all" type="checkbox"/>
</div>
<span class="text-xs text-outline group-hover:text-on-surface transition-colors">Remember device</span>
</label>
<a class="text-xs font-semibold text-primary-fixed-dim hover:text-primary transition-colors tracking-tight" href="#">Forgot Password?</a>
</div>
<button class="w-full py-4 rounded-lg bg-gradient-to-r from-primary to-primary-container text-on-primary font-bold text-sm tracking-wide shadow-lg shadow-primary/10 hover:brightness-110 active:scale-[0.98] transition-all duration-300">
                    AUTHORIZE ACCESS
                </button>
</form>
<div class="mt-10 flex items-center justify-center gap-4">
<div class="h-px w-full bg-outline-variant/20"></div>
<span class="text-[10px] uppercase tracking-widest text-outline whitespace-nowrap">Node Redundancy</span>
<div class="h-px w-full bg-outline-variant/20"></div>
</div>
<div class="mt-8 grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 py-3 bg-surface-container-high ghost-border rounded-lg hover:backdrop-brightness-150 transition-all active:scale-95">
<img alt="Google Logo" class="w-4 h-4 opacity-80" data-alt="Official Google icon with subtle transparency to blend with the industrial dark UI" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBEWsLgXGiYoPK4OE0OzVZm1zC7pdJAjWuX6YO85yAX18zHJNqtQhUfViFuxc7x-aBkHmXAlJnhLnd29NCWkFzYT2CG7tIw7TjhiLo16JXkKMTGX35rRDWmy0g13l8RHbivxY7LJrdk-kplZKKomAzRm0hDwv2LBxoaJ80guthirUjgJH2sn65yPRzX92o8vHkDnC1zGcXtKIvTx4ZOo3xdA9hKUSWU06-u8dHfAfoPoT7wQSlckK698HilidgfrlW2fyCdyTJ9MpY"/>
<span class="text-xs font-semibold text-on-surface">SSO Access</span>
</button>
<button class="flex items-center justify-center gap-2 py-3 bg-surface-container-high ghost-border rounded-lg hover:backdrop-brightness-150 transition-all active:scale-95">
<span class="material-symbols-outlined text-base text-outline" data-icon="fingerprint">fingerprint</span>
<span class="text-xs font-semibold text-on-surface">Biometrics</span>
</button>
</div>
</div>
<div class="mt-12 text-center space-y-4">
<p class="text-xs text-outline">
                New system node? <a class="text-secondary font-bold hover:underline" href="#">Request Credentials</a>
</p>
<div class="flex items-center justify-center gap-6 pt-4 border-t border-white/5">
<div class="flex items-center gap-2">
<span class="w-1.5 h-1.5 bg-secondary rounded-full animate-pulse"></span>
<span class="text-[10px] uppercase tracking-widest text-outline/60">System Online</span>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[14px] text-outline/60" data-icon="verified_user">verified_user</span>
<span class="text-[10px] uppercase tracking-widest text-outline/60">AES-256 Encrypted</span>
</div>
</div>
</div>
</div>
<div class="fixed bottom-0 right-0 p-8 opacity-20 pointer-events-none select-none">
<span class="text-[120px] font-black tracking-tighter text-outline">INTEL</span>
</div>
